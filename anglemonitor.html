<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lid Angle Monitor</title>

  <!-- Clean modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0b;
      font-family:'Inter',sans-serif;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      color:white;
    }

    /* Soft background glow */
    .bg-glow{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      background:radial-gradient(circle,
      rgba(255,255,255,0.08) 0%,
      rgba(255,255,255,0.02) 35%,
      transparent 70%);
      filter:blur(80px);
      z-index:0;
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
    }

    /* Main Number */
    .number{
      font-size:clamp(140px,22vw,320px);
      font-weight:800;
      letter-spacing:-0.06em;
      line-height:0.9;
      color:#f5f5f5;

      /* Matte white style */
      text-shadow:
        0 0 1px rgba(255,255,255,0.3),
        0 0 10px rgba(255,255,255,0.06);

      transition:0.25s ease;
    }

    .degree{
      font-size:0.32em;
      vertical-align:top;
      opacity:0.9;
      margin-left:4px;
    }

    /* Subtitle */
    .label{
      margin-top:24px;
      font-size:0.9rem;
      font-weight:500;
      letter-spacing:0.45em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.35);
    }

    /* Status */
    .status{
      position:fixed;
      bottom:32px;
      left:50%;
      transform:translateX(-50%);
      font-size:0.72rem;
      letter-spacing:0.25em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.25);
    }

    /* Disconnected style */
    body.disconnected .number{
      opacity:0.3;
    }

    /* Smooth pulse when value changes */
    .number.active{
      transform:scale(1.02);
      text-shadow:
        0 0 2px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.10);
    }
  </style>
</head>

<body class="disconnected">

  <div class="bg-glow"></div>

  <div class="container">
    <div class="number" id="angle">
      --<span class="degree">°</span>
    </div>

    <div class="label">Lid Angle</div>
  </div>

  <div class="status" id="conn-status">
    Connecting to bridge...
  </div>

  <script>
    const angleEl = document.getElementById('angle');
    const statusEl = document.getElementById('conn-status');

    let t;

    function setAngle(v){
      angleEl.innerHTML =
        v.toFixed(1) +
        '<span class="degree">°</span>';

      document.body.classList.remove('disconnected');

      angleEl.classList.add('active');

      clearTimeout(t);

      t = setTimeout(()=>{
        angleEl.classList.remove('active');
      },250);
    }

    function connect(){
      const ws = new WebSocket('ws://localhost:8765');

      ws.onopen = ()=>{
        statusEl.textContent = 'Bridge Active';
      };

      ws.onmessage = (e)=>{
        const d = JSON.parse(e.data);
        setAngle(d.angle);
      };

      ws.onclose = ()=>{
        document.body.classList.add('disconnected');

        angleEl.innerHTML =
          '--<span class="degree">°</span>';

        statusEl.textContent = 'Reconnecting...';

        setTimeout(connect,2000);
      };

      ws.onerror = ()=>ws.close();
    }

    connect();
  </script>

</body>
</html>
